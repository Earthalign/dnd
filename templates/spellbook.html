<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wirtualna Księga Zaklęć (Spellbook)</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #0f1115; color: #e5e7eb; }
        .font-serif { font-family: 'Cinzel', serif; }
        
        /* Print Styles for Cards */
        @media print {
            body { background: white; color: black; margin: 0; padding: 0; }
            .no-print { display: none !important; }
            
            .print-container {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
                padding: 10px;
            }
            
            .spell-card {
                width: 63mm; /* standard card 2.5 inches */
                height: 88mm; /* standard card 3.5 inches */
                border: 2px solid #000 !important;
                border-radius: 4px;
                padding: 10px;
                box-sizing: border-box;
                page-break-inside: avoid;
                position: relative;
                overflow: hidden;
                background: white !important;
                color: black !important;
            }
            
            .spell-card-title { font-size: 11pt; font-weight: bold; border-bottom: 1px solid #000; padding-bottom: 2px; margin-bottom: 4px; }
            .spell-card-meta { font-size: 7pt; font-style: italic; margin-bottom: 4px; }
            .spell-card-stats { font-size: 7pt; margin-bottom: 4px; display: grid; grid-template-columns: 1fr 1fr; gap: 2px; }
            .spell-card-desc { font-size: 7pt; line-height: 1.1; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 18; -webkit-box-orient: vertical; }
        }

        /* Web Styles for Cards */
        @media screen {
            .spell-card {
                background: rgba(30, 30, 42, 0.95);
                border: 1px solid rgba(212, 175, 55, 0.4);
                border-radius: 12px;
                padding: 16px;
                transition: transform 0.2s, box-shadow 0.2s;
                position: relative;
                display: flex;
                flex-direction: column;
                height: 320px;
                overflow: hidden;
            }
            .spell-card:hover {
                transform: translateY(-4px);
                box-shadow: 0 10px 20px rgba(212, 175, 55, 0.15);
            }
            .spell-card-title { font-family: 'Cinzel', serif; font-size: 1.1rem; color: #d4af37; font-weight: bold; border-bottom: 1px solid rgba(212, 175, 55, 0.2); padding-bottom: 6px; margin-bottom: 8px; }
            .spell-card-meta { font-size: 0.75rem; color: #9ca3af; font-style: italic; margin-bottom: 8px; }
            .spell-card-stats { font-size: 0.75rem; display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-bottom: 8px; color: #d1d5db; background: rgba(0,0,0,0.2); padding: 6px; rounded-lg; }
            .spell-card-desc { font-size: 0.8rem; color: #9ca3af; flex-grow: 1; overflow-y: auto; padding-right: 4px; }
            .spell-card-desc::-webkit-scrollbar { width: 4px; }
            .spell-card-desc::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.3); border-radius: 4px; }
            
            .spell-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
                gap: 20px;
            }
        }
    </style>
</head>
<body>

<div class="container mx-auto px-4 py-8 max-w-7xl">
    <div class="no-print">
        <header class="text-center mb-8 border-b border-amber-600/20 pb-6">
            <h1 class="text-4xl font-black text-amber-500 font-serif drop-shadow-[0_2px_10px_rgba(212,175,55,0.25)]">📖 Wirtualna Księga Zaklęć</h1>
            <p class="text-gray-400 mt-2 text-sm">Przeglądaj czary i generuj własne karty do druku (PDF)! Wyszukujemy z D&D 5e API.</p>
            <div class="mt-4 flex justify-center gap-4">
                <a href="/" class="text-amber-500 hover:text-amber-400 text-sm font-bold uppercase tracking-wider">&larr; Wróć do Kreatora Postaci</a>
            </div>
        </header>

        <div class="bg-gray-900/60 border border-gray-800 rounded-2xl p-6 mb-8 flex flex-col md:flex-row gap-4 items-end">
            <div class="flex-1">
                <label class="block text-xs uppercase tracking-wider text-gray-400 font-semibold mb-1">Klasa Czarująca</label>
                <select id="class-select" class="w-full bg-gray-950 border border-gray-800 rounded-lg px-4 py-3 text-white text-sm" onchange="loadSpells()">
                    <option value="">Wybierz klasę...</option>
                    <option value="bard">Bard</option>
                    <option value="cleric">Cleric (Kleryk)</option>
                    <option value="druid">Druid</option>
                    <option value="paladin">Paladin (Paladyn)</option>
                    <option value="ranger">Ranger (Łowca)</option>
                    <option value="sorcerer">Sorcerer (Zaklinacz)</option>
                    <option value="warlock">Warlock (Czarnoksiężnik)</option>
                    <option value="wizard">Wizard (Czarodziej)</option>
                </select>
            </div>
            <div class="flex-1">
                <label class="block text-xs uppercase tracking-wider text-gray-400 font-semibold mb-1">Poziom Czaru</label>
                <select id="level-select" class="w-full bg-gray-950 border border-gray-800 rounded-lg px-4 py-3 text-white text-sm" onchange="filterSpells()">
                    <option value="all">Wszystkie</option>
                    <option value="0">Cantrip (Sztuczka)</option>
                    <option value="1">1st Level</option>
                    <option value="2">2nd Level</option>
                    <option value="3">3rd Level</option>
                    <option value="4">4th Level</option>
                    <option value="5">5th Level</option>
                    <option value="6">6th Level</option>
                    <option value="7">7th Level</option>
                    <option value="8">8th Level</option>
                    <option value="9">9th Level</option>
                </select>
            </div>
            <div>
                <button onclick="window.print()" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 px-6 rounded-lg transition duration-200 shadow-[0_0_15px_rgba(16,185,129,0.3)] flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                    Drukuj Karty (PDF)
                </button>
            </div>
        </div>

        <div id="loading" class="text-center text-amber-500 font-serif text-xl hidden my-12">
            Ładowanie zwojów... ✨
        </div>
    </div>

    <!-- Print / Cards Container -->
    <div id="spell-container" class="spell-grid print-container">
        <!-- Cards injected here -->
    </div>
</div>

<script>
    let classSpellsList = [];

    async function loadSpells() {
        const cls = document.getElementById('class-select').value;
        if (!cls) return;

        const container = document.getElementById('spell-container');
        const loading = document.getElementById('loading');
        
        container.innerHTML = '';
        loading.classList.remove('hidden');

        try {
            // Get spells list for class (contains name, level, url)
            const res = await fetch(`https://www.dnd5eapi.co/api/classes/${cls}/spells`);
            const data = await res.json();
            
            classSpellsList = data.results; 
            
            // Set default level to cantrip if available to prevent loading 300 spells at once
            document.getElementById('level-select').value = "0";
            
            await filterSpells();
        } catch (e) {
            console.error(e);
            container.innerHTML = '<p class="text-rose-500">Błąd podczas pobierania zaklęć.</p>';
        } finally {
            loading.classList.add('hidden');
        }
    }

    async function filterSpells() {
        const level = document.getElementById('level-select').value;
        const container = document.getElementById('spell-container');
        const loading = document.getElementById('loading');
        
        container.innerHTML = '';
        loading.classList.remove('hidden');
        
        try {
            // Filter the base list by level
            let filteredList = classSpellsList;
            if (level !== 'all') {
                filteredList = classSpellsList.filter(s => s.level.toString() === level);
            }
            
            // Limit to 50 spells max at a time to prevent browser/API crash
            if (filteredList.length > 50) {
                const warning = document.createElement('div');
                warning.className = 'col-span-full text-amber-500 text-sm mb-4 bg-amber-950/30 p-3 rounded-lg border border-amber-500/30';
                warning.innerText = `Wyświetlanie pierwszych 50 z ${filteredList.length} zaklęć dla lepszej wydajności. Wybierz konkretny poziom, aby zobaczyć wszystkie.`;
                container.appendChild(warning);
                filteredList = filteredList.slice(0, 50);
            }
            
            // Fetch details in small chunks to avoid rate limits (HTTP 429)
            const chunkSize = 10;
            const fullSpells = [];
            
            for (let i = 0; i < filteredList.length; i += chunkSize) {
                const chunk = filteredList.slice(i, i + chunkSize);
                const promises = chunk.map(s => fetch(`https://www.dnd5eapi.co${s.url}`).then(r => r.json()));
                const results = await Promise.all(promises);
                fullSpells.push(...results);
            }

            // Render cards
            fullSpells.forEach(s => {
                const levelText = s.level === 0 ? 'Cantrip' : `Level ${s.level}`;
                const desc = s.desc ? s.desc.join('\\n') : '';
                const comps = s.components ? s.components.join(', ') + (s.material ? ` (${s.material})` : '') : '';
                
                const card = document.createElement('div');
                card.className = 'spell-card';
                card.innerHTML = `
                    <div class="spell-card-title">${s.name}</div>
                    <div class="spell-card-meta">${levelText} ${s.school ? s.school.name : ''}</div>
                    <div class="spell-card-stats">
                        <div><strong>Cast:</strong> ${s.casting_time}</div>
                        <div><strong>Range:</strong> ${s.range}</div>
                        <div><strong>Comp:</strong> ${comps}</div>
                        <div><strong>Dur:</strong> ${s.duration}</div>
                    </div>
                    <div class="spell-card-desc">${desc}</div>
                `;
                container.appendChild(card);
            });
            
        } catch (e) {
            console.error(e);
            container.innerHTML += '<p class="text-rose-500 col-span-full">Wystąpił problem podczas ładowania części zaklęć.</p>';
        } finally {
            loading.classList.add('hidden');
        }
    }
</script>

</body>
</html>
